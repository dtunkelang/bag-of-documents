[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "UP",   # pyupgrade (modern Python)
    "B",    # bugbear (common pitfalls)
    "SIM",  # simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E741",   # ambiguous variable name (D, I are FAISS convention)
    "B905",   # zip() without strict= (FAISS results always match)
    "SIM105", # contextlib.suppress (try/except is clearer here)
    "SIM108", # ternary operator (not always clearer)
]

[tool.ruff.lint.per-file-ignores]
"demo.py" = ["E402"]  # FastAPI imports after setup code
"recompute_bags.py" = ["SIM115"]  # Long-lived file handle for JSONL append

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
